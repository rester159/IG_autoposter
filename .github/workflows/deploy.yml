name: Deploy to UNRAID

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to UNRAID
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UNRAID_HOST }}
          username: root
          key: ${{ secrets.UNRAID_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop ig-autoposter || true
            docker rm ig-autoposter || true
            docker run -d \
              --name ig-autoposter \
              --restart unless-stopped \
              -p 3099:3000 \
              -v /mnt/user/appdata/ig-autoposter/data:/app/data \
              -v /mnt/user/appdata/ig-autoposter/incoming:/data/incoming \
              -v /mnt/user/appdata/ig-autoposter/posted:/data/posted \
              -v /mnt/user/appdata/ig-autoposter/incoming_video:/data/incoming_video \
              -v /mnt/user/appdata/ig-autoposter/posted_video:/data/posted_video \
              -v /mnt/user/appdata/ig-autoposter/game_images:/data/game_images \
              -v /mnt/user/appdata/ig-autoposter/team:/data/team \
              ${{ env.IMAGE_NAME }}:latest
